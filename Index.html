<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aluforma Dashboard</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1c;
            --card-bg: #161e2d;
            --blue: #3b82f6;
            --red: #ef4444;
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); font-family: sans-serif;
            color: var(--text);
        }

        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 30px;
        }

        .app-card {
            width: 80%;
            max-width: 300px;
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .app-card:hover { border-color: var(--blue); }
        .app-card i { font-size: 60px; margin-bottom: 15px; }
        .app-card.fabrika i { color: var(--blue); }
        .app-card.terreni i { color: var(--red); }
        .app-card h2 { margin: 0; font-size: 18px; letter-spacing: 1px; }

        /* Kjo pjesa këtu bën që faqja e re të zërë gjithë ekranin */
        #full-container {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white; /* Ose ngjyra që ka Fabrika.html */
            z-index: 9999;
        }

        iframe {
            width: 100%; height: 100%; border: none;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Menuja Kryesore -->
    <div id="main-menu">
        <div style="text-align: center;">
            <h1>ALUFORMA <span style="color: var(--blue)">PLAST</span></h1>
            <p style="color: #64748b;">Zgjidh modulin e punës</p>
        </div>

        <div class="app-card fabrika" onclick="hapDirekt('Fabrika.html')">
            <i class="material-icons">precision_manufacturing</i>
            <h2>FABRIKA</h2>
        </div>

        <div class="app-card terreni" onclick="hapDirekt('Terreni.html')">
            <i class="material-icons">location_on</i>
            <h2>TERRENI</h2>
        </div>
    </div>

    <!-- Ekrani që mbulon gjithçka -->
    <div id="full-container">
        <iframe id="iframe-render"></iframe>
    </div>

    <script>
        function hapDirekt(url) {
            const container = document.getElementById('full-container');
            const iframe = document.getElementById('iframe-render');
            
            // Ngarkon faqen
            iframe.src = url;
            
            // Shfaq kontejnerin që mbulon gjithë menunë
            container.style.display = 'block';
            
            // Fsheh menunë që mos të rrijë në sfond
            document.getElementById('main-menu').classList.add('hidden');
        }
    </script>
</body>
</html>
